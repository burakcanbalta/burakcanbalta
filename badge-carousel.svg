</g>



</g>



<!-- Glow -->

<rect x="100"
      y="190"
      width="2200"
      height="110"
      rx="18"
      fill="none"
      stroke="#00d9ff"
      stroke-width="4"
      opacity="0">

<animate attributeName="opacity"
values="0;0.8;0"
dur="5s"
repeatCount="indefinite"/>

</rect>



</svg>
