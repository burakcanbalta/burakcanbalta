      y="-35"
      width="180"
      height="70"
      rx="10"
      fill="#0984e3"/>

<text x="70"
      y="10"
      text-anchor="middle"
      font-family="Courier New"
      font-size="28"
      fill="white">

KDC

</text>


<animateTransform
attributeName="transform"
