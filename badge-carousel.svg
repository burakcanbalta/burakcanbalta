<!-- KRBTGT -->

<g>

<rect x="240"
      y="-35"
      width="260"
      height="70"
      rx="10"
      fill="#f1c40f"/>

<text x="370"
      y="10"
      text-anchor="middle"
      font-family="Courier New"
      font-size="28"
      fill="black">

KRBTGT

</text>


<animateTransform
attributeName="transform"
