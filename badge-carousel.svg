<svg width="2400" height="280" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="2400"
      height="280"
      fill="#000000"/>


<!-- Header -->

<text x="70"
      y="65"
      font-family="Courier New, monospace"
      font-size="42"
      fill="#00d9ff"
      letter-spacing="3">

// CORPORATE NIGHTMARE MODE

</text>


<text x="75"
      y="105"
      font-family="Courier New, monospace"
      font-size="20"
      fill="#777">

</text>



<!-- Main Frame -->

<rect x="40"
      y="145"
      width="2320"
      height="90"
      rx="12"
      fill="#050505"
      stroke="#00d9ff"
      stroke-width="3"/>




<!-- Moving Pipeline -->

<g>

<animateTransform
attributeName="transform"
type="translate"
from="-1000 190"
to="2600 190"
dur="25s"
repeatCount="indefinite"/>



