<svg width="2400" height="360" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="100%" height="100%" fill="#000000"/>


<!-- Main Header -->
<text x="120"
      y="90"
      font-family="Courier New, monospace"
      font-size="48"
      fill="#00d9ff"
      letter-spacing="4">

// CORPORATE NIGHTMARE MODE

</text>


<!-- Sub Header -->
<text x="125"
      y="140"
      font-family="Courier New, monospace"
      font-size="24"
      fill="#777">


</text>



<!-- Main Panel -->

<rect x="100"
      y="190"
      width="2200"
      height="110"
      rx="18"
      fill="#050505"
      stroke="#00d9ff"
      stroke-width="4"/>



<g transform="translate(1200,245)">



<!-- LSASS -->

<g>

<rect x="-1050"
      y="-35"
      width="220"
      height="70"
      rx="10"
      fill="#e63946"/>

<text x="-940"
      y="10"
      text-anchor="middle"
      font-family="Courier New"
      font-size="28"
      fill="white">
LSASS
</text>


<animateTransform
attributeName="transform"
type="translate"
from="-1050 0"
to="2800 0"
dur="32s"
repeatCount="indefinite"/>

</g>





<!-- MIMIKATZ -->

<g>

<rect x="-760"
      y="-35"
      width="300"
      height="70"
      rx="10"
      fill="#9b59b6"/>

<text x="-610"
      y="10"
      text-anchor="middle"
      font-family="Courier New"
      font-size="28"
      fill="white">

MIMIKATZ

</text>


<animateTransform
attributeName="transform"
type="translate"
from="-760 0"
to="2800 0"
dur="32s"
repeatCount="indefinite"
begin="3s"/>

</g>





<!-- KERBEROS -->

<g>

<rect x="-400"
      y="-35"
      width="300"
      height="70"
      rx="10"
