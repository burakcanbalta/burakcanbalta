<svg width="1200" height="120" xmlns="http://www.w3.org/2000/svg">

<!-- Background -->
<rect width="100%" height="100%" fill="#000000"/>


<!-- Header -->
<text x="35"
      y="25"
      font-family="Courier New, monospace"
      font-size="14"
      fill="#00d9ff">

// CORPORATE NIGHTMARE MODE //

</text>


<!-- Main Container -->
<rect x="20"
      y="40"
      width="1160"
      height="55"
      rx="8"
      fill="#050505"
      stroke="#00d9ff"
      stroke-width="1"/>



<!-- Moving Badges -->
<g transform="translate(600,67)">


<!-- LSASS -->

<g>
<rect x="-560"
      y="-15"
      width="90"
      height="30"
      rx="4"
      fill="#e63946"/>

<text x="-515"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="white">

LSASS

</text>

<animateTransform
attributeName="transform"
type="translate"
from="-560 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"/>

</g>



<!-- MIMIKATZ -->

<g>

<rect x="-420"
      y="-15"
      width="120"
      height="30"
      rx="4"
      fill="#9b59b6"/>

<text x="-360"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="white">

MIMIKATZ

</text>

<animateTransform
attributeName="transform"
type="translate"
from="-420 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"
begin="2s"/>

</g>




<!-- KERBEROS -->

<g>

<rect x="-250"
      y="-15"
      width="120"
      height="30"
      rx="4"
      fill="#00b894"/>

<text x="-190"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="white">

KERBEROS

</text>


<animateTransform
attributeName="transform"
type="translate"
from="-250 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"
begin="4s"/>

</g>





<!-- KDC -->

<g>

<rect x="-80"
      y="-15"
      width="80"
      height="30"
      rx="4"
      fill="#0984e3"/>

<text x="-40"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="white">

KDC

</text>


<animateTransform
attributeName="transform"
type="translate"
from="-80 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"
begin="6s"/>

</g>





<!-- KRBTGT -->

<g>

<rect x="50"
      y="-15"
      width="100"
      height="30"
      rx="4"
      fill="#f1c40f"/>

<text x="100"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="black">

KRBTGT

</text>


<animateTransform
attributeName="transform"
type="translate"
from="50 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"
begin="8s"/>

</g>





<!-- GOLDEN TICKET -->

<g>

<rect x="210"
      y="-15"
      width="150"
      height="30"
      rx="4"
      fill="#d4af37"/>

<text x="285"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="black">

GOLDEN TICKET

</text>


<animateTransform
attributeName="transform"
type="translate"
from="210 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"
begin="10s"/>

</g>





<!-- DOMAIN ACCESS -->

<g>

<rect x="420"
      y="-15"
      width="140"
      height="30"
      rx="4"
      fill="#00ffff"/>

<text x="490"
      y="5"
      text-anchor="middle"
      font-family="Courier New"
      font-size="12"
      fill="black">

DOMAIN ACCESS

</text>


<animateTransform
attributeName="transform"
type="translate"
from="420 0"
to="1500 0"
dur="22s"
repeatCount="indefinite"
begin="12s"/>

</g>


</g>



<!-- Glow Effect -->

<rect x="20"
      y="40"
      width="1160"
      height="55"
      rx="8"
      fill="none"
      stroke="#00d9ff"
      opacity="0">

<animate attributeName="opacity"
values="0;0.5;0"
dur="3s"
repeatCount="indefinite"/>

</rect>


</svg>
